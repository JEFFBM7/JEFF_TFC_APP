# =============================================================================
#  EduConnect — Nginx (VPS Hostinger / Ubuntu)
#  Front (Vue/dist) + API Laravel + WebSocket Reverb sur UNE SEULE origine.
#  -> /var/www/educonnect/frontend/dist        (SPA)
#  -> /api /broadcasting /sanctum /up /storage  (Laravel public/index.php)
#  -> /app                                       (Reverb WebSocket :8080)
#
#  Après avoir posé ce fichier :
#    sudo ln -s /etc/nginx/sites-available/educonnect.conf /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#    sudo certbot --nginx -d educonnect.school -d www.educonnect.school
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name educonnect.school www.educonnect.school;

    # --- Racine = build du frontend ---
    root /var/www/educonnect/frontend/dist;
    index index.html;

    # Uploads / PDF bulletins
    client_max_body_size 25M;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- API + endpoints Laravel (même origine que le SPA) ---
    location ~ ^/(api|broadcasting|sanctum|up|storage)(/|$) {
        root /var/www/educonnect/backend/public;
        try_files $uri /index.php$is_args$args;
    }

    # --- Exécution PHP (Laravel) ---
    location ~ \.php$ {
        root /var/www/educonnect/backend/public;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;   # <-- adapter à ta version PHP
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    # --- WebSocket Reverb (messagerie temps réel) ---
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # garde la connexion ws ouverte
    }

    # --- Assets statiques du build (cache long, ils sont hashés) ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Le service worker ne doit jamais être mis en cache
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # --- SPA : tout le reste retombe sur index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité de base
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    location ~ /\.(?!well-known) { deny all; }
}
